<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ashvale Online</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


    <!-- Main Game World -->
    <div id="game">


        <!-- ======================
             Castle Area
        ======================= -->

        <div class="castle">

            <div class="tower left-tower"></div>

            <div class="tower right-tower"></div>

            <div class="castle-wall"></div>

            <div class="castle-door"></div>

        </div>




        <!-- ======================
             World Objects
        ======================= -->


        <!-- Main Path -->

        <div class="path main-path"></div>




        <!-- Trees / Resources -->


        <div class="tree tree1">

            <div class="tree-top"></div>

            <div class="tree-trunk"></div>

        </div>



        <div class="tree tree2">

            <div class="tree-top"></div>

            <div class="tree-trunk"></div>

        </div>



        <div class="tree tree3">

            <div class="tree-top"></div>

            <div class="tree-trunk"></div>

        </div>





        <!-- ======================
             Player Character
        ======================= -->


        <div id="player">

            <div class="head"></div>

            <div class="body"></div>

            <div class="legs"></div>

        </div>





        <!-- ======================
             Player Interface
        ======================= -->


        <div id="interface">


            <div class="status">

                ❤️ HP:

                <span id="hp">
                    100
                </span>

            </div>




            <div class="skill">

                🪓 Woodcutting:

                <span id="wood-level">
                    Level 1
                </span>

            </div>




            <div class="experience">

                ⭐ XP:

                <span id="wood-xp">
                    0
                </span>

            </div>




            <div class="inventory">

                🎒 Logs:

                <span id="logs">
                    0
                </span>

            </div>


        </div>


    </div>




    <!-- Game JavaScript -->

    <script src="script.js"></script>


</body>

</html>
